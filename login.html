<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | UniNest</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-container {
      max-width: 400px; 
      margin: 8rem auto 4rem; 
      padding: 2.5rem; 
      background: var(--color-white); 
      border-radius: var(--border-radius); 
      box-shadow: var(--shadow-lg);
    }
    .auth-container h1 {
      text-align: center; 
      margin-bottom: 2rem;
      font-size: 1.8rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--color-dark);
    }
    .form-group input {
      width: 100%; 
      border: 1px solid var(--color-gray-light); 
      padding: 0.75rem; 
      border-radius: var(--border-radius);
      outline: none;
      transition: var(--transition-fast);
    }
    .form-group input:focus {
      border-color: var(--color-primary);
    }
    .error-msg {
      color: #e53e3e; 
      margin-bottom: 1rem; 
      display: none;
      font-size: 0.9rem;
    }
  </style>
</head>
<body class="page-auth">
  <nav class="navbar scrolled">
    <div class="container nav-container">
      <a href="index.html" class="logo">UniNest</a>
      <button class="mobile-menu-btn" aria-label="Toggle menu" onclick="this.parentElement.classList.toggle('mobile-menu-open')">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="search.html">Properties</a>
        <a href="agents.html">Agents</a>
      </div>
      <div class="nav-actions">
        <!-- Injected by auth.js -->
      </div>
    </div>
  </nav>

  <section class="container">
    <div class="auth-container">
      <h1>Log In</h1>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="student@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required />
        </div>
        <div id="login-error" class="error-msg"></div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Log In</button>
      </form>
      <p style="text-align: center; margin-top: 1.5rem; color: var(--color-gray);">
        Don't have an account? <a href="signup.html" style="color: var(--color-primary); font-weight: 500;">Sign Up</a>
      </p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-grid">
        <div class="footer-brand">
          <h3>UniNest</h3>
          <p>Finding student accommodation made simple, safe, and secure.</p>
        </div>
        <div>
          <h4>Quick Links</h4>
          <ul class="footer-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="search.html">Find Property</a></li>
            <li><a href="agents.html">Our Agents</a></li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        &copy; 2026 UniNest. All rights reserved.
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
